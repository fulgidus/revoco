# GoReleaser configuration for revoco
# https://goreleaser.com
#
# To test locally: goreleaser release --snapshot --clean
# To release: git tag v0.1.0 && git push origin v0.1.0

version: 2

project_name: revoco

before:
  hooks:
    - go mod tidy

builds:
  - id: revoco
    main: .
    binary: revoco
    env:
      - CGO_ENABLED=0
    # Note: Building without bundled tools for now
    # Users should install exiftool and ffmpeg via their package manager
    # Future: Add bundled tools support once binary sources are stable
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.Commit={{.ShortCommit}}
      - -X main.BuildDate={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      # Windows arm64 is rare, skip for now
      - goos: windows
        goarch: arm64

archives:
  - id: default
    formats:
      - tar.gz
    # Use zip for Windows
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    files:
      - source.url
      - LICENSE*

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

changelog:
  sort: asc
  use: github
  # Only include commits since the previous tag
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'
      - Merge pull request
      - Merge branch
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Performance
      regexp: '^.*?perf(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: Others
      order: 999

# Git configuration for proper tag detection
git:
  # Ensure we get the correct previous tag for changelog
  tag_sort: -version:refname
  prerelease_suffix: "-"

release:
  github:
    owner: fulgidus
    name: revoco
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
  header: |
    ## Installation

    ### Quick Install (Linux/macOS)
    ```bash
    curl -fsSL https://raw.githubusercontent.com/fulgidus/revoco/main/install.sh | bash
    ```

    ### Manual Download
    Download the appropriate archive for your platform below, extract it, and move the `revoco` binary to a directory in your PATH.

    ### Checksums
    Verify your download with the checksums.txt file.
  footer: |
    ---
    **Full Changelog**: https://github.com/fulgidus/revoco/compare/{{ .PreviousTag }}...{{ .Tag }}

# Homebrew tap
brews:
  - repository:
      owner: fulgidus
      name: homebrew-revoco
    homepage: https://github.com/fulgidus/revoco
    description: Data liberation tool for escaping big tech walled gardens
    license: GPL-3.0
    dependencies:
      - name: exiftool
      - name: ffmpeg
    install: |
      bin.install "revoco"
    # Homebrew Formulas are deprecated in GoReleaser v2; migrate to homebrew_casks
    disable: true

# Chocolatey packages
chocolateys:
  - name: revoco
    owners: fulgidus
    authors: fulgidus
    project_url: https://github.com/fulgidus/revoco
    icon_url: https://github.com/fulgidus/revoco/raw/main/logo/revoco.png
    copyright: 2026 fulgidus
    license_url: https://github.com/fulgidus/revoco/blob/main/LICENSE
    require_license_acceptance: false
    project_source_url: https://github.com/fulgidus/revoco
    docs_url: https://github.com/fulgidus/revoco/blob/main/README.md
    bug_tracker_url: https://github.com/fulgidus/revoco/issues
    tags: data-liberation google-photos google-drive takeout exif metadata
    summary: Data liberation tool for escaping big tech walled gardens
    description: |
      Revoco helps you take back control of your data by importing from cloud services and exporting to storage you own.
      Currently focused on Google services (Drive, Photos Takeout), with more connectors planned.
    release_notes: https://github.com/fulgidus/revoco/releases/tag/v{{ .Version }}
    dependencies:
      - id: exiftool
        version: 12.0.0
      - id: ffmpeg
        version: 6.0.0
    api_key: '{{ .Env.CHOCOLATEY_API_KEY }}'
    skip_publish: false

# Debian and RPM packages
nfpms:
  - id: revoco
    package_name: revoco
    file_name_template: '{{ .ConventionalFileName }}'
    vendor: fulgidus
    homepage: https://github.com/fulgidus/revoco
    maintainer: fulgidus <fulgidus@users.noreply.github.com>
    description: Data liberation tool for escaping big tech walled gardens
    license: GPL-3.0
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    contents:
      - src: LICENSE
        dst: /usr/share/doc/revoco/LICENSE
    dependencies:
      - libimage-exiftool-perl
      - ffmpeg
    overrides:
      rpm:
        dependencies:
          - perl-Image-ExifTool
          - ffmpeg

# Scoop bucket
scoops:
  - repository:
      owner: fulgidus
      name: scoop-revoco
    homepage: https://github.com/fulgidus/revoco
    description: Data liberation tool for escaping big tech walled gardens
    license: GPL-3.0
    skip_upload: false

# Docker images
dockers:
  - image_templates:
      - 'ghcr.io/fulgidus/revoco:{{ .Tag }}'
      - 'ghcr.io/fulgidus/revoco:v{{ .Major }}'
      - 'ghcr.io/fulgidus/revoco:v{{ .Major }}.{{ .Minor }}'
      - 'ghcr.io/fulgidus/revoco:latest'
    dockerfile: Dockerfile
    build_flag_templates:
      - '--pull'
      - '--label=org.opencontainers.image.created={{ .Date }}'
      - '--label=org.opencontainers.image.title={{ .ProjectName }}'
      - '--label=org.opencontainers.image.revision={{ .FullCommit }}'
      - '--label=org.opencontainers.image.version={{ .Version }}'
      - '--label=org.opencontainers.image.source=https://github.com/fulgidus/revoco'
      - '--label=org.opencontainers.image.description=Data liberation tool for escaping big tech walled gardens'
      - '--label=org.opencontainers.image.licenses=GPL-3.0'
    skip_push: false

# AUR packages
aurs:
  - name: revoco-bin
    homepage: https://github.com/fulgidus/revoco
    description: Data liberation tool for escaping big tech walled gardens
    maintainers:
      - 'fulgidus <fulgidus@users.noreply.github.com>'
    license: GPL-3.0
    private_key: '{{ .Env.AUR_SSH_PRIVATE_KEY }}'
    git_url: 'ssh://aur@aur.archlinux.org/revoco-bin.git'
    depends:
      - exiftool
      - ffmpeg
    skip_upload: false
