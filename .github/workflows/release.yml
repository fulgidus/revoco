# Release workflow - triggered by version tags
name: Release

on:
  push:
    tags:
      - 'v*'
      - '!v*-dev-*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install dependencies for bundling
        run: |
          sudo apt-get update
          sudo apt-get install -y curl tar xz-utils unzip

      - name: Set up SSH for AUR
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}

      - name: Add AUR to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine previous stable tag
        id: previous_tag
        run: |
          PREVIOUS_TAG=$(git tag --sort=-version:refname --list 'v*' | grep -Ev -- '-dev-' | grep -Fxv "${GITHUB_REF_NAME}" | head -n 1 || true)
          echo "tag=${PREVIOUS_TAG}" >> "$GITHUB_OUTPUT"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}
          GORELEASER_PREVIOUS_TAG: ${{ steps.previous_tag.outputs.tag }}
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          SCOOP_TAP_TOKEN: ${{ secrets.GH_PAT }}  # Used by both Scoop and Homebrew taps in goreleaser

      - name: Submit to Winget
        # Skip pre-releases; continue-on-error until first manual submission to winget-pkgs
        if: "!contains(github.ref, '-')"
        continue-on-error: true
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: fulgidus.revoco
          token: ${{ secrets.WINGET_TOKEN }}
