# Dev Release workflow - triggered by pushes to develop branch
name: Dev Release

on:
  push:
    branches:
      - develop

permissions:
  contents: write
  packages: write

jobs:
  dev-release:
    name: Dev Release
    runs-on: ubuntu-latest
    concurrency:
      group: dev-release
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Generate dev tag
        id: tag
        run: |
          LATEST_STABLE_TAG=$(git tag --sort=-version:refname --list 'v*' | grep -Ev -- '-dev-' | head -n 1 || true)
          if [ -z "${LATEST_STABLE_TAG}" ]; then
            LATEST_STABLE_TAG="v0.0.0"
          fi
          DEV_TAG="${LATEST_STABLE_TAG}-dev-$(date -u +%Y%m%dT%H%M%S)"
          echo "tag=${DEV_TAG}" >> $GITHUB_OUTPUT
          echo "base_tag=${LATEST_STABLE_TAG}" >> $GITHUB_OUTPUT

      - name: Create and push tag
        run: |
          git tag "${{ steps.tag.outputs.tag }}"
          git push origin "refs/tags/${{ steps.tag.outputs.tag }}"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --config .goreleaser.dev.yaml --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.tag.outputs.tag }}
          GORELEASER_PREVIOUS_TAG: ${{ steps.tag.outputs.base_tag }}
